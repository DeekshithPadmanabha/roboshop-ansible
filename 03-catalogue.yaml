---
#====================================================================================================================
# PLAY: Configure Catalogue Microservice
#Purpose: Deploys Node.js app and loads initial into MongoDB.
#====================================================================================================================
- name: configure catalogue   
  hosts: catalogue              # Targets the [catalogue] group
  become: yes                   # Root access required
  tasks:
   #--- APP SETUP START---
  - name: enable nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: create system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "Roboshop system user"
 
  # Clean Deployment Strategy
  - name: delete app directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete catalogue zip.file
    ansible.builtin.file:
      path: /tmp/catalogue.zip
      state: absent

  - name: download catalogue
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip 

  - name: unarchieve catalogue
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app 
      remote_src: yes

  - name: install dependencies
    community.general.npm:
      path: /app    