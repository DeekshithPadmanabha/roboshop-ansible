- name: create ec2 instance and route53 records
  hosts: all 
  connection: local
  vars:
    sg_id: sg-0a697c68c12d16675
    ami_id: ami-0220d79f3f480ecf5
    domain_name: deekshi88s.online
    env: dev
    instances:
    - mongodb
    - catalogue
  tasks:
  - name: create ce2 insatnces
    amazon.aws.ec2_instance:
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: "roboshop"
        Component: "{{ item }}-{{ env }}"
        Environment: "{{ env }}"
        Name: "{{item }}-{{ env }}"
    loop: "{{ instances }}" 
    register: ec2_output 

  - name: print the ec2_output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"  

  - name: crete route53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"  
      record: "{{ item.item }}-{{ env }}.{{ domain_name }}" # mongodb-dev.deekshi88s.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"    